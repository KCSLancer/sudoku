<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- ── SEO ── -->
    <title>Neon Sudoku — 무료 온라인 스도쿠 게임</title>
    <meta name="description" content="네온 테마의 무료 온라인 스도쿠 게임. Easy부터 Expert까지 4단계 난이도, 메모 모드, 힌트 기능 지원. 인간 풀이 로직 기반의 정확한 스도쿠 퍼즐을 즐겨보세요.">
    <meta name="keywords" content="스도쿠, sudoku, 무료 스도쿠, 온라인 스도쿠, neon sudoku, 퍼즐 게임">
    <meta name="author" content="Neon Sudoku">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://kcslancer.github.io/sudoku/">

    <!-- ── Open Graph ── -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://kcslancer.github.io/sudoku/">
    <meta property="og:title" content="Neon Sudoku — 무료 온라인 스도쿠 게임">
    <meta property="og:description" content="네온 테마의 무료 온라인 스도쿠. Easy~Expert 4단계 난이도, 메모 모드, 힌트 지원.">
    <meta property="og:locale" content="ko_KR">

    <!-- ── Twitter Card ── -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Neon Sudoku — 무료 온라인 스도쿠 게임">
    <meta name="twitter:description" content="네온 테마의 무료 온라인 스도쿠. Easy~Expert 4단계 난이도, 메모 모드, 힌트 지원.">

    <!-- ── Google AdSense ── -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4708261522306406" crossorigin="anonymous"></script>

    <!-- ── Fonts ── -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">

    <!-- ── Stylesheet ── -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loading">
    <span>GENERATING PUZZLE</span>
    <div class="loading-bar"></div>
</div>

<!-- ══ MENU ══ -->
<div id="menu-screen" class="active-screen">
    <h1 class="title">NEON SUDOKU</h1>
    <button class="menu-btn" onclick="startGame('Easy')">EASY</button>
    <button class="menu-btn" onclick="startGame('Medium')">MEDIUM</button>
    <button class="menu-btn" onclick="startGame('Hard')">HARD</button>
    <button class="menu-btn" onclick="startGame('Expert')">EXPERT</button>
    <button class="menu-btn" onclick="showRecords()" style="margin-top:24px;border-color:var(--cyan);color:var(--cyan)">HIGH SCORES</button>
</div>

<!-- ══ GAME ══ -->
<div id="game-screen">
    <!-- 상단 배너 -->
    <div class="banner-slot">
        <ins class="adsbygoogle"
             style="display:block;width:100%;height:50px;"
             data-ad-client="ca-pub-4708261522306406"
             data-ad-slot="auto"
             data-ad-format="horizontal"
             data-full-width-responsive="true"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <div class="game-header">
        <div class="stat-box">
            <span class="stat-label">Level</span>
            <span class="stat-value" id="ui-level">-</span>
        </div>
        <div class="stat-box">
            <span class="stat-label">Score</span>
            <span class="stat-value" id="ui-score">0</span>
        </div>
        <div class="stat-box">
            <span class="stat-label">Time</span>
            <span class="stat-value" id="ui-time">00:00</span>
        </div>
        <div class="stat-box">
            <span class="stat-label">Hints</span>
            <span class="stat-value" id="ui-hints">0</span>
        </div>
    </div>

    <div class="board-wrapper">
        <div class="board-container">
            <div class="board" id="board"></div>
        </div>
    </div>

    <div class="controls-area">
        <!-- Row 1: MEMO + numpad (2 rows of 5) -->
        <div class="main-controls">
            <button id="memo-toggle" onclick="toggleMemoMode()">
                <span class="memo-icon">✏️</span>
                <span>MEMO</span>
                <span id="memo-label">OFF</span>
            </button>
            <div class="numpad">
                <div class="numpad-row">
                    <button class="num-btn" onclick="handleInput(1)">1</button>
                    <button class="num-btn" onclick="handleInput(2)">2</button>
                    <button class="num-btn" onclick="handleInput(3)">3</button>
                    <button class="num-btn" onclick="handleInput(4)">4</button>
                    <button class="num-btn" onclick="handleInput(5)">5</button>
                </div>
                <div class="numpad-row">
                    <button class="num-btn" onclick="handleInput(6)">6</button>
                    <button class="num-btn" onclick="handleInput(7)">7</button>
                    <button class="num-btn" onclick="handleInput(8)">8</button>
                    <button class="num-btn" onclick="handleInput(9)">9</button>
                    <button class="num-btn del-inline" onclick="handleInput(0)">⌫</button>
                </div>
            </div>
        </div>

        <!-- Row 2: HINT + QUIT -->
        <div class="action-row">
            <button class="action-btn" onclick="useHint()">💡 HINT</button>
            <button class="action-btn" onclick="backToMenu()">⏏ QUIT</button>
        </div>
    </div>

    <div id="hint-text"></div>
</div>

<!-- ══ RECORDS ══ -->
<div id="records-screen">
    <h1 class="title" style="font-size:2rem">HIGH SCORES</h1>
    <div class="record-board" id="records-container"></div>
    <button class="menu-btn" onclick="backToMenu()">BACK</button>
</div>

<!-- ══ WIN MODAL ══ -->
<div class="win-overlay" id="win-modal">
    <div class="win-title">SYSTEM CLEARED</div>
    <div class="win-detail">Level: <strong id="win-level" style="color:var(--purple);font-family:Orbitron"></strong></div>
    <div class="win-detail" style="margin-bottom:4px">Time: <strong id="win-time" style="color:var(--cyan);font-family:Orbitron"></strong></div>
    <div class="win-score-val" id="win-score"></div>
    <button class="menu-btn" onclick="closeWinModal()">CONTINUE</button>
</div>

<script src="game.js"></script>
</body>
</html>
